title: About Me
description: A bit more about my journey as a full‑stack engineer and how I build scalable, user‑centric products.
profileImage:
  src: /avatars/profile-image-2.png
  alt: Sean Erick C. Ramones
content: |
  Hi, I'm **Sean Erick Ramones**, an AI-augmented full‑stack software engineer with over 7 years of experience building modern, performant web applications.

  I focus on turning complex ideas into elegant, scalable products — pairing deep frontend craft (**Vue 3**, **Nuxt**), backend systems work (**Node.js**, **FastAPI**), data (**PostgreSQL/Supabase**), and serverless deploys (**Vercel**, **Cloudflare**) with agentic AI tooling: **Claude Code**, **MCP**, the **Claude Agent SDK**, and the **Anthropic API**. Most of my hands-on manual work now flows through AI hand-offs while I drive architecture, judgment, and review.

  ### What I care about

  - Type‑safe code and clean architecture
  - Reusable components and design systems
  - Performance, accessibility, and DX
  - CI/CD and code review culture that scales

  ### Selected experience

  - Miller Development AB — Full‑stack Software Engineer (Hybrid, 2019–Present)
  - Better Trade Off Ltd. — Software Developer (Contract, 2023–2024)
  - SCI Global Services — Full‑stack Software Developer (On-site, 2018–2019)

  ### Beyond the code

  - Running and cross‑fit training
  - Watching anime; reading Japanese manga/light novels
  - Playing MOBA games (**Dota 2**) and relaxing games (**Stardew Valley**)
  - Driving and exploring new places
  - Making espresso coffee and showing my (terrible) latte art to friends/colleagues.

  If you’d like to collaborate, reach me at **seancramones@gmail.com** or connect on [LinkedIn](https://www.linkedin.com/in/sean-erick-ramones-102a64192).
