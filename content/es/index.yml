faq:
  title: Preguntas Frecuentes
  description: Respuestas a preguntas comunes sobre cómo trabajo, colaboro y qué busco a continuación.
  categories:
    - title: Trabajo y Colaboración
      questions:
        - label: "¿En qué tipo de proyectos te enfocas?"
          content: |
            Construyo aplicaciones web full-stack, dashboards y plataformas SaaS con interfaces ricas en datos y fáciles de usar. En el frontend uso principalmente Vue/Nuxt (y React cuando es necesario). En el backend trabajo con Node.js y FastAPI, con PostgreSQL/Supabase para datos.
        - label: "¿Cómo aseguras la escalabilidad y calidad del código?"
          content: |
            Favorezco código type-safe (TypeScript), arquitectura clara y componentes modulares, pruebas automatizadas donde importa, y perfilado de rendimiento.
        - label: "¿Trabajas en proyectos nuevos o bases de código existentes?"
          content: |
            Ambos. Disfruto construcciones desde cero y tengo experiencia en migraciones y modernización.
    - title: Compensación y Disponibilidad
      questions:
        - label: "¿Cómo abordas las discusiones de compensación?"
          content: |
            La compensación depende del alcance del rol, responsabilidades y paquete general. Prefiero alinear expectativas e impacto primero.
        - label: "¿Estás abierto a trabajo por contrato o freelance?"
          content: |
            Sí, estoy abierto a roles de tiempo completo así como a contratos. Para contratos, prefiero alcances, entregables y plazos claramente definidos.
        - label: "¿Cuál es tu disponibilidad y compatibilidad de zona horaria?"
          content: |
            Trabajo principalmente en UTC+8 y puedo alinearme a horas de superposición para equipos en otras zonas horarias.
        - label: "¿Qué roles estás buscando?"
          content: |
            Principalmente roles de **Ingeniero de Software Full-stack** o **Ingeniero Frontend (Vue/Nuxt)**.
        - label: "¿Cuál es tu período de preaviso?"
          content: |
            Típicamente **1–3 semanas**, dependiendo de la carga de trabajo activa y los requisitos de transición.
    - title: Sobre Mí
      questions:
        - label: "¿Qué disfrutas fuera del trabajo?"
          content: |
            - Correr
            - Entrenamiento de cross-fit
            - Ver anime
            - Leer manga/novelas ligeras japonesas
            - Jugar juegos MOBA (Dota 2) y juegos relajantes (Stardew Valley)
            - Conducir y explorar nuevos lugares
            - ¡Café! Ya sea preparando pour-over o usando la máquina de espresso.
        - label: "¿Qué te motiva en tu trabajo como ingeniero?"
          content: |
            Convertir ideas complejas en productos escalables y bien diseñados que se sienten fáciles de usar.
        - label: "¿Con qué tecnología prefieres trabajar?"
          content: |
            Vue 3, Nuxt, Node.js, FastAPI, PostgreSQL/Supabase y herramientas modernas (Vite, GitHub, CI/CD).
