testimonials:
  title: Testimonios
  description: Comentarios de colegas y clientes.
  items:
    - quote: |
        He tenido el placer de trabajar con Sean durante cuatro años. Durante ese tiempo, ha sido mi persona de referencia cada vez que tengo preguntas sobre desarrollo frontend. Si bien me he enfocado más en el trabajo de backend, siempre he admirado lo competente que es Sean con las tecnologías frontend y cómo se mantiene constantemente actualizado con las últimas herramientas y mejores prácticas.

        Sean es fácil de trabajar, accesible y siempre dispuesto a ayudar. Explica las cosas de manera clara y paciente, haciendo que la colaboración sea fluida y productiva.

        Recomiendo ampliamente a Sean a cualquier equipo que busque un desarrollador frontend hábil que no solo sea técnicamente fuerte sino también genuinamente colaborativo y solidario.
      author:
