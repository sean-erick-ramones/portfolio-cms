aiWorkflows:
  title: AI-Augmented Workflows
  description: How I ship faster without cutting corners — agentic tooling paired with engineering judgment, not replacing it.
  items:
    - title: Agentic delivery with Claude Code & Claude Design
      description: I use Claude Design to prototype UI ideas and translate draft designs into component structure, then hand off implementation, refactors, and test scaffolding to Claude Code — driving architecture and review while AI compresses the delivery cycle.
      tools:
        - Claude Code
        - Claude Design
      icon: i-simple-icons-anthropic
    - title: MCP servers for project context
      description: Custom MCP servers — including Figma MCP — expose design tokens, component specs, project schemas, and internal docs directly to AI tools, so suggestions stay grounded in the actual codebase and design system, not generic patterns.
      tools:
        - MCP
        - Figma MCP
        - TypeScript
      icon: i-lucide-server
    - title: Anthropic API in production
      description: Claude-powered features wired into real Vue/Nuxt and FastAPI backends — structured outputs, tool use, and prompt caching tuned for production.
      tools:
        - Anthropic API
        - Claude Agent SDK
      icon: i-lucide-sparkles
