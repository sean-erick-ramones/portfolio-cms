title: Hi! I'm Sean Erick Ramones, an AI-Augmented Full-stack Engineer
about:
  title: About Me
  description: |
    As an AI-augmented full-stack software engineer with over 7 years of experience, I build modern, performant web applications and pair them with agentic workflows that compress delivery time without compromising quality.
    I blend deep frontend craft, backend systems work, and AI tooling — Claude Code, MCP, the Claude Agent SDK, and the Anthropic API — to ship products that are scalable, accessible, and developer-friendly.
